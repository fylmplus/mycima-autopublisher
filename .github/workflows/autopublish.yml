name: MyCima Auto Publisher
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: Test Base44 API
        run: |
          echo "Testing Base44 API..."
          curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "api_key: ${{ secrets.BASE44_API_KEY }}" \
            "https://mycima.base44.app/api/entities/Setting"

      - name: Debug Wecima HTML
        run: |
          python3 -c "
import requests
from bs4 import BeautifulSoup

headers = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36',
    'Accept-Language': 'ar,en;q=0.9',
}
res = requests.get('https://wecima.cx', headers=headers)
soup = BeautifulSoup(res.text, 'html.parser')

print('STATUS:', res.status_code)
print('--- First 3000 chars of HTML ---')
print(res.text[:3000])
"

      - name: Run scraper
        env:
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
        run: python main.py
