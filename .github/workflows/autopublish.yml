name: MyCima Auto Publisher
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Test Base44 API
        run: |
          echo "Testing Base44 API..."
          curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "api_key: ${{ secrets.BASE44_API_KEY }}" \
            "https://mycima.base44.app/api/entities/Setting"

      - name: Debug Wecima HTML
        run: python3 debug.py

      - name: Run scraper
        env:
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
        run: python main.py
